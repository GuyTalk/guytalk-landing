  <rect x="820" y="220" width="308" height="52" rx="16" fill="#2B6FFF"/>
  <rect x="820" y="252" width="308" height="20" fill="#2B6FFF"/>
  <text x="974" y="252" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1.5">FREE · DAILY · 5 MINUTES</text>
  <text x="974" y="308" fill="#0F1724" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" text-anchor="middle">Subscribe Free</text>
  <text x="974" y="334" fill="#6E6862" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">guytalkmedia.com</text>
  <rect x="870" y="356" width="208" height="24" rx="6" fill="#2B6FFF"/>
  <text x="974" y="372" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.5">Get the brief →</text>

