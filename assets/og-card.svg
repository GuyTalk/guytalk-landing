<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F1724"/>

  <!-- Subtle blue radial glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#2B6FFF" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0F1724" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo wordmark -->
  <text x="72" y="96" fill="#FFFFFF" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="-1">GuyTalk</text>
  <circle cx="280" cy="82" r="6" fill="#2B6FFF"/>

  <!-- Pill badge -->
  <rect x="72" y="128" width="460" height="38" rx="19" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <circle cx="99" cy="147" r="5" fill="#2B6FFF"/>
  <text x="113" y="153" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">DON'T BE THE LAST GUY TO KNOW · FREE · 5 MIN</text>

  <!-- Main headline line 1 -->
  <text x="72" y="310" fill="#FFFFFF" font-family="Arial Black, Arial, sans-serif" font-size="128" font-weight="900" letter-spacing="-5">The Relevance</text>

  <!-- Main headline line 2 -->
  <text x="72" y="448" fill="#2B6FFF" font-family="Arial Black, Arial, sans-serif" font-size="128" font-weight="900" letter-spacing="-5">Brief.</text>

  <!-- Subtitle -->
  <text x="72" y="506" fill="rgba(255,255,255,0.55)" font-family="Arial, sans-serif" font-size="22" font-weight="400">Sports, markets, and culture — every morning in 5 minutes. Free.</text>

  <!-- Subscribe CTA button -->
  <rect x="72" y="544" width="240" height="52" rx="10" fill="#2B6FFF"/>
  <text x="192" y="576" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle" letter-spacing="0.3">Get the brief →</text>

  <!-- Domain -->
  <text x="1128" y="576" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="15" text-anchor="end">guytalkmedia.com</text>
</svg>
