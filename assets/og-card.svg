  <rect x="72" y="388" width="140" height="40" rx="8" fill="#EBF1FF"/>
  <text x="142" y="413" fill="#2B6FFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1">SPORTS</text>

  <rect x="224" y="388" width="152" height="40" rx="8" fill="#EBF1FF"/>
  <text x="300" y="413" fill="#2B6FFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1">MARKETS</text>

  <rect x="388" y="388" width="110" height="40" rx="8" fill="#EBF1FF"/>
  <text x="443" y="413" fill="#2B6FFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1">GOLF</text>

