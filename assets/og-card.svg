  <text x="556" y="463" fill="#6E6862" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.8">F1</text>

  <rect x="618" y="440" width="100" height="36" rx="8" fill="#F9F8F5" stroke="#E5E2DB" stroke-width="1.5"/>
  <text x="668" y="463" fill="#6E6862" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.8">GOLF</text>

