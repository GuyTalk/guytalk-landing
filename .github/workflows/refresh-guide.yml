name: Weekly Guide Refresh

on:
  schedule:
    # Every Sunday at 6am EDT (10am UTC)
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Refresh guide picks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/refresh-guide.js

      - name: Apply patches (prices, new picks, archive stale picks)
        run: node scripts/apply-guide-patches.js

      - name: Source images for any new picks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/fetch-guide-images.js

      - name: Commit refreshed guide
        run: |
          git config user.name  "GuyTalk Bot"
          git config user.email "guytalkdaily@gmail.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: weekly guide refresh ($(date -u '+%Y-%m-%d'))"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
