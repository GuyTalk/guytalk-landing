name: Generate Daily Brief

on:
  schedule:
    - cron: '0 9 * * *'   # 5am ET target — scheduled GH Actions cron routinely fires 30-120min late, so this buffers toward a 7am ET read
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      APPROVAL_TOKEN: ${{ secrets.APPROVAL_TOKEN }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      PO_BOX: ${{ secrets.PO_BOX }}
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate brief
        id: generate
        timeout-minutes: 25
        run: |
          set +e
          node scripts/generate-brief.js
          code=$?
          set -e
          if [ "$code" -eq 42 ]; then
            echo "Today's issue already exists on pending — skipping the rest of this run."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ]; then
            node scripts/notify-research-failure.js
            exit 1
          fi

      - name: QA check
        if: steps.generate.outputs.skipped != 'true'
        run: node scripts/qa-brief.js || (node scripts/notify-qa-failure.js; exit 1)

      - name: Update homepage
        if: steps.generate.outputs.skipped != 'true'
        run: node scripts/update-homepage.js

      - name: Configure git
        if: steps.generate.outputs.skipped != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GuyTalk Brief Bot"

      - name: Commit and push to pending
        if: steps.generate.outputs.skipped != 'true'
        run: |
          git add brief/ assets/ briefs/ index.html
          if git diff --staged --quiet; then
            echo "Nothing to commit — brief already up to date"
            exit 0
          fi
          ISSUE=$(ls brief/ | grep -E '^issue-[0-9]{3}$' | sort | tail -1)
          git commit -m "Brief: ${ISSUE} — $(date '+%B %d, %Y')"
          git fetch origin pending 2>/dev/null || true
          git push origin HEAD:pending --force-with-lease

      - name: Send review notification
        if: steps.generate.outputs.skipped != 'true'
        run: node scripts/notify-review.js
